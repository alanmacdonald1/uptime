name: Teams Alerts

on:
  workflow_run:
    workflows: ["Uptime CI"]
    types:
      - completed

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check latest commit for status change
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get only the single most recent commit message
          LATEST=$(gh api repos/${{ github.repository }}/commits \
            --jq '.[0].commit.message' \
            -H "Accept: application/vnd.github+json")

          echo "Latest commit: $LATEST"

          if echo "$LATEST" | grep -q "🟥"; then
            echo "status=down" >> $GITHUB_OUTPUT
            # Extract service name from commit like "🟥 IFCB Dashboard is down (0 in 0 ms)"
            SERVICE=$(echo "$LATEST" | sed 's/🟥 //' | sed 's/ is down.*//')
            echo "service=$SERVICE" >> $GITHUB_OUTPUT

          elif echo "$LATEST" | grep -q "🟩"; then
            echo "status=up" >> $GITHUB_OUTPUT
            SERVICE=$(echo "$LATEST" | sed 's/🟩 //' | sed 's/ is up.*//')
            echo "service=$SERVICE" >> $GITHUB_OUTPUT

          else
            echo "status=none" >> $GITHUB_OUTPUT
          fi

      - name: Send DOWN alert
        if: steps.check.outputs.status == 'down'
        run: |
          curl -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "message",
              "attachments": [{
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.2",
                  "body": [
                    {
                      "type": "TextBlock",
                      "text": "🚨 Service Down",
                      "weight": "Bolder",
                      "size": "Large",
                      "color": "Attention"
                    },
                    {
                      "type": "TextBlock",
                      "text": "${{ steps.check.outputs.service }} is currently unreachable.",
                      "wrap": true
                    },
                    {
                      "type": "TextBlock",
                      "text": "Repo: ${{ github.repository }}",
                      "isSubtle": true,
                      "wrap": true
                    }
                  ],
                  "actions": [{
                    "type": "Action.OpenUrl",
                    "title": "View Status",
                    "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"
                  }]
                }
              }]
            }'

      - name: Send RECOVERY alert
        if: steps.check.outputs.status == 'up'
        run: |
          curl -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "message",
              "attachments": [{
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.2",
                  "body": [
                    {
                      "type": "TextBlock",
                      "text": "✅ Service Recovered",
                      "weight": "Bolder",
                      "size": "Large",
                      "color": "Good"
                    },
                    {
                      "type": "TextBlock",
                      "text": "${{ steps.check.outputs.service }} is back online.",
                      "wrap": true
                    },
                    {
                      "type": "TextBlock",
                      "text": "Repo: ${{ github.repository }}",
                      "isSubtle": true,
                      "wrap": true
                    }
                  ],
                  "actions": [{
                    "type": "Action.OpenUrl",
                    "title": "View Status",
                    "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"
                  }]
                }
              }]
            }'
