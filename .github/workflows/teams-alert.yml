name: Teams Alerts

on:
  workflow_run:
    workflows: ["Uptime CI"]
    types:
      - completed

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check commit for actual status transition
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT=$(gh api repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }} \
            --jq '.commit.message' \
            -H "Accept: application/vnd.github+json")

          echo "Current commit: $CURRENT"

          # Get a few recent commit messages so we can find the previous status commit
          PREVIOUS=$(gh api repos/${{ github.repository }}/commits \
            -H "Accept: application/vnd.github+json" \
            --jq '.[].commit.message' | grep -E '🟥|🟩' | sed -n '2p')

          echo "Previous status commit: $PREVIOUS"

          current_status="none"
          previous_status="none"
          service=""

          if echo "$CURRENT" | grep -q "🟥"; then
            current_status="down"
            service=$(echo "$CURRENT" | sed 's/🟥 //' | sed 's/ is down.*//')
          elif echo "$CURRENT" | grep -q "🟩"; then
            current_status="up"
            service=$(echo "$CURRENT" | sed 's/🟩 //' | sed 's/ is up.*//')
          fi

          if echo "$PREVIOUS" | grep -q "🟥"; then
            previous_status="down"
          elif echo "$PREVIOUS" | grep -q "🟩"; then
            previous_status="up"
          fi

          echo "current_status=$current_status" >> $GITHUB_OUTPUT
          echo "previous_status=$previous_status" >> $GITHUB_OUTPUT
          echo "service=$service" >> $GITHUB_OUTPUT

      - name: Send DOWN alert
        if: steps.check.outputs.current_status == 'down' && steps.check.outputs.previous_status != 'down'
        run: |
          curl -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "message",
              "attachments": [{
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.2",
                  "body": [
                    {
                      "type": "TextBlock",
                      "text": "🚨 Service Down",
                      "weight": "Bolder",
                      "size": "Large",
                      "color": "Attention"
                    },
                    {
                      "type": "TextBlock",
                      "text": "${{ steps.check.outputs.service }} is currently unreachable.",
                      "wrap": true
                    },
                    {
                      "type": "TextBlock",
                      "text": "Repo: ${{ github.repository }}",
                      "isSubtle": true,
                      "wrap": true
                    }
                  ],
                  "actions": [{
                    "type": "Action.OpenUrl",
                    "title": "View Status",
                    "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"
                  }]
                }
              }]
            }'

      - name: Send RECOVERY alert
        if: steps.check.outputs.current_status == 'up' && steps.check.outputs.previous_status == 'down'
        run: |
          curl -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "message",
              "attachments": [{
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.2",
                  "body": [
                    {
                      "type": "TextBlock",
                      "text": "✅ Service Recovered",
                      "weight": "Bolder",
                      "size": "Large",
                      "color": "Good"
                    },
                    {
                      "type": "TextBlock",
                      "text": "${{ steps.check.outputs.service }} is back online.",
                      "wrap": true
                    },
                    {
                      "type": "TextBlock",
                      "text": "Repo: ${{ github.repository }}",
                      "isSubtle": true,
                      "wrap": true
                    }
                  ],
                  "actions": [{
                    "type": "Action.OpenUrl",
                    "title": "View Status",
                    "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"
                  }]
                }
              }]
            }'
